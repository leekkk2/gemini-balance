name: Docker Image CI

on:
  push:
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  # github.repository as <account>/<repo>
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # 这个权限用于标记容器镜像
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 登录到 GitHub Container Registry
      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # https://github.com/docker/metadata-action/tree/v5/?tab=readme-ov-file#semver
            # Event: push,     Ref: refs/head/main,       Tags: main
            # Event: push tag, Ref: refs/tags/v1.2.3,     Tags: 1.2.3, 1.2, 1, latest
            # Event: push tag, Ref: refs/tags/v2.0.8-rc1, Tags: 2.0.8-rc1
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
          labels: |
            org.opencontainers.image.description=OpenAI API Compatible Server
            org.opencontainers.image.source=${{ github.event.repository.html_url }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          file: Dockerfile
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          load: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ github.workflow }}
          cache-to: type=gha,scope=${{ github.workflow }}

  # 镜像推送成功后，SSH 到部署主机拉取新镜像并重建容器。
  # 敏感项（主机名 / SSH 私钥 / host 指纹）走 Secrets；非敏感项（用户名 /
  # 端口 / compose 目录）走 repository Variables。详见 docs/CICD.md。
  deploy:
    needs: build
    runs-on: ubuntu-latest
    # 仅 push 到 main 分支时部署；PR 与其它分支不触发
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      # fork-safe 守卫：下游 fork 无 DEPLOY_HOST secret 时整个部署 no-op，不 fail。
      # 注：secrets context 在 job/step 级 if 条件中不可用，因此用 guard step
      # 读取 secret 落到 output，后续步骤再按 output 决定是否执行。
      - name: Check deploy secrets present
        id: guard
        run: |
          if [ -n "${{ secrets.DEPLOY_HOST }}" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::DEPLOY_HOST 未配置，跳过部署（fork-safe no-op）"
          fi

      - name: Deploy to server over SSH
        if: steps.guard.outputs.ready == 'true'
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ vars.DEPLOY_PORT }}
          username: ${{ vars.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          # host-key 校验：固定 SHA256 指纹，避免盲 TOFU
          fingerprint: ${{ secrets.DEPLOY_FINGERPRINT }}
          # request_pty + 不使用 script_stop：规避 appleboy 旧坑（吞 stdout/
          # 误报非零退出）；失败检测交由脚本内 set -euo pipefail
          request_pty: true
          script: |
            set -euo pipefail
            cd "${{ vars.DEPLOY_PATH }}"
            # 部署主机磁盘紧张：拉取前后各清一次 dangling 镜像
            docker image prune -f
            docker compose pull
            docker compose up -d
            docker image prune -f
            docker compose ps
